[keyconfig]

# keyconfig.ini
# defines the input_emulator key bindings
# multiple keys are to be specified comma separated

# Options:

# allows the user to mouse wheel scroll through the PV selection list
mouse_scroll_pv_selection = true

# the interval it takes for the emulated slider touch points to move from one contact point to another.
# in most cases this does not need editing.
touch_slider_emulation_speed = 750.0

# JVS Buttons:
JVS_TEST = F1
JVS_SERVICE = F2
JVS_START = Enter, Ds4_Options, XINPUT_START
JVS_TRIANGLE = Z, W, I, Ds4_Triangle, Ds4_DPad_Up, XINPUT_Y, XINPUT_UP, XINPUT_LT, XINPUT_RT, Ds4_L2, Ds4_R2, Ds4_L_Trigger, Ds4_R_Trigger
JVS_SQUARE = X, A, J, Ds4_Square, Ds4_DPad_Left, XINPUT_X, XINPUT_LEFT, XINPUT_LT, XINPUT_RT, Ds4_L2, Ds4_R2, Ds4_L_Trigger, Ds4_R_Trigger
JVS_CROSS = Period, S, K, Ds4_Cross, Ds4_DPad_Down, XINPUT_A, XINPUT_DOWN, XINPUT_LT, XINPUT_RT, Ds4_L2, Ds4_R2, Ds4_L_Trigger, Ds4_R_Trigger
JVS_CIRCLE = Slash, D, L, Ds4_Circle, Ds4_DPad_Right, XINPUT_B, XINPUT_RIGHT, XINPUT_LT, XINPUT_RT, Ds4_L2, Ds4_R2, Ds4_L_Trigger, Ds4_R_Trigger
JVS_LEFT = Left, Up, Ds4_L1, Ds4_L_Stick_Up, Ds4_R_Stick_Up, XINPUT_LS
JVS_RIGHT = Right, Down, Ds4_R1, Ds4_L_Stick_Down, Ds4_R_Stick_Down, XINPUT_RS

# Touch Slider:
LEFT_SIDE_SLIDE_LEFT = LeftShift, Q, Ds4_L_Stick_Left, XINPUT_LLEFT
LEFT_SIDE_SLIDE_RIGHT = RightShift, E, Ds4_L_Stick_Right, XINPUT_LRIGHT
RIGHT_SIDE_SLIDE_LEFT = LeftControl, U, Ds4_R_Stick_Left, XINPUT_RLEFT
RIGHT_SIDE_SLIDE_RIGHT = RightControl, O, Ds4_R_Stick_Right, XINPUT_RRIGHT
rumble = true
xinput_rumble_intensity_left = 8000
xinput_rumble_intensity_right = 4000
xinput_preferred = 0
autopause = true
